<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seni Seviyorum Şevvalim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        /* Temel Sayfa Ayarları */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe0e9 100%);
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden; /* Taşmaları engelle */
            position: relative;
        }

        /* Ana Konteyner */
        .container {
            max-width: 500px;
            width: 90%;
            margin: 20px auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.6);
            backdrop-filter: blur(5px); /* Hafif bulanık arka plan */
            z-index: 10; /* Kalplerin üstünde kalması için */
            position: relative;
        }

        /* Fotoğraf Stili (Geliştirilmiş) */
        .main-photo {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 20px;
            border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.5s ease;
            margin-bottom: 20px;
        }

        .main-photo:hover {
            transform: scale(1.03) rotate(1deg);
        }

        /* Başlıklar ve Metinler */
        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff4d6d;
            font-size: 3.5rem;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            color: #7a7a7a;
            font-size: 1.2rem;
            margin-top: -10px;
            margin-bottom: 30px;
        }

        p {
            line-height: 1.8;
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 20px;
            color: #555;
        }

        .heart-icon {
            color: #ff4d6d;
            font-size: 2.5rem;
            animation: beat .3s infinite alternate;
            display: inline-block;
            margin: 15px 0;
        }

        @keyframes beat {
            to { transform: scale(1.3); }
        }

        .footer {
            margin-top: 30px;
            font-weight: 600;
            color: #ff758c;
            letter-spacing: 3px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* --- KALP EFEKTLERİ STİLLERİ --- */
        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.8);
            font-size: 20px;
            pointer-events: none; /* Kalplere tıklanamasın */
            z-index: 1;
            animation: floatHeart 4s linear forwards;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Mobil Ekran Ayarları */
        @media (max-width: 480px) {
            h1 { font-size: 2.6rem; }
            .container { padding: 30px 20px; width: 85%; }
            p { font-size: 1rem; }
            .main-photo { max-width: 280px; }
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <div class="container">
        <img src="sevval.jpg" alt="Atakan ve Şevval" class="main-photo">
        
        <h1>Şevvalim</h1>
        <h2>Seni Çok Seviyorum</h2>
        
        <div class="heart-icon">❤️</div>

        <p>
            Her anımda, her gülüşümde ve geleceğe dair kurduğum her hayalde sen varsın. 
            Seninle geçen her saniye benim için dünyanın en değerli hazinesi.
        </p>

        <p>
            İyi ki hayatımdasın, iyi ki benimlesin...
        </p>

        <div class="footer">
            DAİMA SENİNLE, ATAKAN
        </div>
    </div>

    <script>
        const heartContainer = document.getElementById('heart-container');
        const heartSymbols = ['❤️', '💖', '💗', '💓', '💕'];

        // Rastgele kalp sembolü seçer
        function getRandomHeart() {
            return heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        }

        // Kalp oluşturur ve ekrana ekler
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerText = getRandomHeart();
            
            // Rastgele yatay pozisyon (ekran genişliğince)
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Başlangıç yüksekliği (ekranın biraz altından başlar)
            heart.style.top = (100 + Math.random() * 10) + 'vh';

            // Rastgele boyut
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';

            // Rastgele animasyon süresi (bazıları hızlı, bazıları yavaş)
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';

            heartContainer.appendChild(heart);

            // Animasyon bittiğinde kalbi kaldır
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // 1. OTOMATİK KALPLER: Sayfa açıldığında sürekli kalpler uçuşsun
        setInterval(createHeart, 300); // Her 0.3 saniyede bir kalp oluştur

        // 2. TIKLAMA KALPLERİ: Şevval ekrana her tıkladığında 5 kalp çıksın
        document.body.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                setTimeout(createHeart, i * 100); // Kalpleri hafif gecikmeli oluştur
            }
        });
    </script>

</body>
</html>
